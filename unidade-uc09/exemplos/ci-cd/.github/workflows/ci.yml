name: exemplo-ci-stack-uc09

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  dotnet-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências da API
        run: echo "Exemplo didático: ajuste este passo para a pasta real da API em C#."

  angular-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build do front-end Angular
        run: echo "Exemplo didático: ajuste este passo para executar npm install e npm run build no projeto Angular."
